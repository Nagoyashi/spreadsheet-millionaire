[pytest]
# Run from inside backend/ (same cwd as the app — see CLAUDE.md Hard Rule #1).
# pythonpath puts backend/ on sys.path so `from app import ...` resolves under the
# bare `pytest` console script too (not just `python -m pytest`, which adds cwd).
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra
