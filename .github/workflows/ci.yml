name: CI

# Runs on every PR into develop or main, and on direct pushes to them.
# The develop -> main PR is the one that deploys prod (Vercel + Render track main),
# so this is the gate that must be green before that merge.

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

# Least privilege — CI only needs to read the code.
permissions:
  contents: read

# A newer push to the same PR/branch cancels the older in-flight run (saves minutes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"            # >= the README's Node 18 floor; bump to match Vercel if needed
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci                      # reproducible install; requires frontend/package-lock.json committed
      - run: npm run lint                # ESLint (flat config) — #41
      - run: npm test                    # vitest run — #26
      - run: npm run build               # the build check from CLAUDE.md § Commands

  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend       # CLAUDE.md Hard Rule #1: the app + tests run from inside backend/
    services:
      # Throwaway Postgres for the DB-backed tests (auth, IDOR, saved-data). The
      # pytest harness skips those without TEST_DATABASE_URL; here we provide one
      # so they actually run — no reliance on Neon (#27 acceptance criterion).
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # conftest forces a hermetic env (dummy DATABASE_URL, blank REDIS_URL, etc.)
      # but reads TEST_DATABASE_URL to enable the db/auth_client fixtures and point
      # the app at the service above. sslmode=disable is REQUIRED: config.py's
      # _ensure_sslmode() would otherwise append sslmode=require, and the plain
      # postgres:16 service has no SSL — every connection would fail.
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db?sslmode=disable
      # Guard against silent green (#183): if TEST_DATABASE_URL were ever lost
      # (renamed var, service misconfig), the db fixture would skip the entire
      # DB-backed majority and CI would still pass. Under CI_REQUIRE_DB=1,
      # conftest hard-fails instead of skipping.
      CI_REQUIRE_DB: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"         # the README's documented floor; bump to match Render if needed
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt   # pulls in requirements.txt + pytest

      # We deliberately do NOT boot the app via gunicorn; pytest builds it through
      # the create_app() factory with the harness's test config. Compile-checking
      # additionally catches syntax errors across every module.
      - name: Compile-check the backend
        run: python -m compileall -q .

      - name: Run pytest
        # -ra surfaces skip/fail reasons in the log, so an unexpected skip is
        # visible at a glance even when it isn't fatal.
        run: pytest -q -ra

      # CLAUDE.md hard rule #1: intra-backend imports must be bare (Flask runs from
      # inside backend/, so a 'backend.' prefix breaks at runtime). Enforce it.
      - name: Enforce rule #1 — no 'backend.' import prefix
        run: |
          if grep -rnE '^[[:space:]]*(from|import)[[:space:]]+backend\.' . --include='*.py'; then
            echo "::error::Found a 'backend.' import prefix — breaks at runtime (CLAUDE.md hard rule #1). Use bare module names."
            exit 1
          fi
          echo "OK — no 'backend.' import prefixes."
