name: CI

# Runs on every PR into develop or main, and on direct pushes to them.
# The develop -> main PR is the one that deploys prod (Vercel + Render track main),
# so this is the gate that must be green before that merge.

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

# Least privilege — CI only needs to read the code.
permissions:
  contents: read

# A newer push to the same PR/branch cancels the older in-flight run (saves minutes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"            # >= the README's Node 18 floor; bump to match Vercel if needed
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci                      # reproducible install; requires frontend/package-lock.json committed
      - run: npm run lint --if-present   # runs the lint script only if you have one; no-op otherwise
      - run: npm run build               # the build check from CLAUDE.md § Commands

  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"         # the README's documented floor; bump to match Render if needed
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt

      # We deliberately do NOT boot the app: create_app() exits without a real
      # FLASK_SECRET_KEY / DATABASE_URL (your fail-loud config), so a boot check
      # would always fail in CI. Compile-checking catches syntax errors instead.
      - name: Compile-check the backend
        run: python -m compileall -q backend

      - name: Run tests if present
        run: |
          if ls backend/tests/ backend/test_*.py >/dev/null 2>&1; then
            pip install pytest
            python -m pytest backend -q
          else
            echo "No tests found — skipping (add backend/tests/ or backend/test_*.py to enable)."
          fi

      # CLAUDE.md hard rule #1: intra-backend imports must be bare (Flask runs from
      # inside backend/, so a 'backend.' prefix breaks at runtime). Enforce it.
      - name: Enforce rule #1 — no 'backend.' import prefix
        run: |
          if grep -rnE '^[[:space:]]*(from|import)[[:space:]]+backend\.' backend --include='*.py'; then
            echo "::error::Found a 'backend.' import prefix — breaks at runtime (CLAUDE.md hard rule #1). Use bare module names."
            exit 1
          fi
          echo "OK — no 'backend.' import prefixes."
